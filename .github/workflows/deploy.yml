name: Deploy Next.js App

on:
  push:
    branches:
      - main   # 只要 main 更新就部署

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ SSH 部署
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/var/www/law

            # 确保目录存在
            mkdir -p $APP_DIR
            cd $APP_DIR

            # 检查是否是 Git 仓库
            if [ ! -d ".git" ]; then
              # 不是 Git 仓库，重新克隆
              echo "Initializing git repository..."
              # 彻底清理目录
              find . -mindepth 1 -delete 2>/dev/null || true
              # 克隆代码
              git clone https://github.com/DJ-hl/Law.git .
            else
              # 是 Git 仓库，拉取最新代码
              echo "Pulling latest code..."
              git fetch --all
              git reset --hard origin/main
            fi

            # 安装依赖
            npm install

            # 构建
            npm run build

            # 启动/重启服务
            # 尝试停止进程（忽略错误）
            pm2 stop next-app > /dev/null 2>&1 || true
            # 尝试删除进程（忽略错误）
            pm2 delete next-app > /dev/null 2>&1 || true
            # 启动新进程
            pm2 start npm --name "next-app" -- start
            # 保存 PM2 配置
            pm2 save