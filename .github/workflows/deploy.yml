name: Deploy Next.js App

on:
  push:
    branches:
      - main   # 只要 main 更新就部署

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ SSH 部署
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/var/www/law

            # 如果目录不存在，clone
            if [ ! -d "$APP_DIR" ]; then
              mkdir -p $APP_DIR
              cd $APP_DIR
              git clone https://github.com/DJ-hl/Law.git .
            fi

            cd $APP_DIR

            # 拉最新代码
            git fetch --all
            git reset --hard origin/main

            # 安装依赖
            npm install

            # 构建
            npm run build

            # 启动/重启服务
            pm2 delete next-app || true
            pm2 start npm --name "next-app" -- start
            pm2 save