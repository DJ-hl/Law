name: CI/CD Pipeline

on:
  push:
    branches:
      - main   # 只要 main 更新就触发

jobs:
  # CI 阶段：代码检查
  ci:
    name: CI - Code Quality Check
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ 安装依赖
      - name: Install dependencies
        run: npm install

      # 3️⃣ 执行 Lint 检查
      - name: Run lint
        run: npm run lint

  # CD 阶段：部署
  cd:
    name: CD - Deploy to Server
    runs-on: ubuntu-latest
    needs: ci  # 依赖于 CI 阶段成功完成

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ SSH 部署
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/var/www/law

            # 确保目录存在
            mkdir -p $APP_DIR
            cd $APP_DIR

            # 检查是否是 Git 仓库
            if [ ! -d ".git" ]; then
              # 不是 Git 仓库，重新克隆
              echo "Initializing git repository..."
              rm -rf * 2>/dev/null || true
              git clone https://github.com/DJ-hl/Law.git .
            else
              # 是 Git 仓库，拉取最新代码
              echo "Pulling latest code..."
              git fetch --all
              git reset --hard origin/main
            fi

            # 安装依赖
            npm install

            # 构建
            npm run build

            # 启动/重启服务
            pm2 delete law-next || true
            pm2 start npm --name "law-next" -- start
            pm2 save